<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --ink: #e6edf3;
    --muted: #8b949e;
    --line: #30363d;
    --accent: #3fb950;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    line-height: 1.55;
  }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ---------- header ---------- */
  .hero {
    text-align: center;
    padding: 56px 16px 22px;
    max-width: 980px;
    margin: 0 auto;
  }
  .hero img.logo { width: 104px; height: auto; border-radius: 22px; }
  .hero h1 {
    font-size: 2.5rem;
    font-weight: 800;
    margin-top: 14px;
    letter-spacing: -.01em;
  }
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 22px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 999px;
    padding: 9px 20px;
    font-size: .95rem;
    font-weight: 600;
  }
  .btn:hover { border-color: var(--muted); text-decoration: none; }
  .btn.primary { background: #1f6feb; border-color: #1f6feb; }
  .btn.primary:hover { background: #2f81f7; }
  .btn.disabled { opacity: .55; cursor: default; pointer-events: none; }

  /* ---------- wall ---------- */
  .wall-controls { text-align: center; padding: 8px 0 18px; }
  .wall-controls button {
    background: var(--panel);
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: .85rem;
    cursor: pointer;
  }
  .wall-controls button:hover { color: var(--ink); border-color: var(--muted); }
  .video-wall {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
    padding: 0 10px;
    max-width: 1680px;
    margin: 0 auto;
  }
  .tile {
    border-radius: 8px;
    overflow: hidden;
    background: var(--panel);
    box-shadow: 0 2px 10px rgba(0,0,0,.45);
  }
  .tile video {
    display: block;
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
  }

  /* ---------- footer ---------- */
  footer {
    margin-top: 56px;
    border-top: 1px solid var(--line);
    padding: 24px 16px 40px;
    text-align: center;
    color: var(--muted);
    font-size: .8rem;
  }
  footer p + p { margin-top: 6px; }
</style>

<script>
(function () {
  "use strict";
  var videos = Array.prototype.slice.call(
    document.querySelectorAll("#video-wall video"));
  var reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var userPaused = false;

  function tryPlay(v) {
    if (userPaused || reduced) return;
    v.muted = true;
    var p = v.play();
    if (p && p.catch) p.catch(function () {});
  }

  var io = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) tryPlay(e.target);
      else e.target.pause();
    });
  }, { threshold: 0.25 });
  videos.forEach(function (v) { io.observe(v); });

  document.addEventListener("visibilitychange", function () {
    if (document.hidden) videos.forEach(function (v) { v.pause(); });
    else videos.forEach(function (v) {
      var r = v.getBoundingClientRect();
      if (r.bottom > 0 && r.top < window.innerHeight) tryPlay(v);
    });
  });

  var btn = document.getElementById("wall-toggle");
  if (reduced) { userPaused = true; btn.textContent = "Play all"; }
  btn.addEventListener("click", function () {
    userPaused = !userPaused;
    btn.textContent = userPaused ? "Play all" : "Pause all";
    if (userPaused) videos.forEach(function (v) { v.pause(); });
    else videos.forEach(function (v) {
      var r = v.getBoundingClientRect();
      if (r.bottom > 0 && r.top < window.innerHeight) tryPlay(v);
    });
  });
})();
</script>
