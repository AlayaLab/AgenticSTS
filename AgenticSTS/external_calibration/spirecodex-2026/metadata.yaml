notes: |
  CRITICAL: Live spire-codex.com returns HTTP 403 to WebFetch (Cloudflare/WAF).
  Could not independently verify the paper's specific numerical counts.

  GitHub README counts diverge from paper:
    - Cards: README 403 vs paper 576 (MISMATCH)
    - Monsters: README 111 vs paper 115 (MISMATCH +4)
    - Events: README 66 vs paper 66 (MATCH)
    - Relics, encounters: README has no number (unverified)

  Likely explanations: (a) README counts have lagged behind live API entries
  since the last manual refresh; (b) paper counted card base+upgraded variants
  separately while README counts base cards only (576/403 ~= 1.43, consistent
  with most cards having a base+upgrade pair); (c) the paper queried the live
  /api/* endpoints directly and got authoritative counts.

  Verification path: open the live site in a real browser (or use a properly-
  headered HTTP client) and hit /api/cards, /api/relics, /api/monsters,
  /api/encounters, /api/events; record exact counts and append them to this
  snapshot.
